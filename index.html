<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quotes - Editorial Feed</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');
        
        body {
            background-color: #fafaf8;
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            color: #222;
        }

        .quote-text {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            color: #1a1a1a;
        }

        .quote-card {
            background-color: white;
            border: 1px solid #eef0f2;
            border-radius: 1.5rem;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .quote-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.08), 0 4px 6px -2px rgba(0, 0, 0, 0.04);
            border-color: #e2e8f0;
        }

        .skeleton {
            background: linear-gradient(90deg, #f0f0f0 25%, #e0e0e0 50%, #f0f0f0 75%);
            background-size: 200% 100%;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }

        .copy-button {
            border: 1px solid #e5e7eb;
            background: transparent;
        }
        
        .copy-button:hover {
            background-color: #f9fafb;
        }

        /* Hide scrollbar but keep functionality */
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
</head>
<body class="min-h-screen py-12 px-4">
    <div class="max-w-[680px] mx-auto">
        <!-- Header & Search -->
        <header class="mb-12">
            <h1 class="text-4xl font-extrabold mb-8 tracking-tight text-gray-900">Quotes</h1>
            <div class="relative">
                <input 
                    type="text" 
                    id="search-input" 
                    placeholder="Search by author or content..." 
                    class="w-full px-6 py-4 bg-white border border-gray-200 rounded-2xl focus:outline-none focus:ring-2 focus:ring-black/5 focus:border-gray-400 transition-all shadow-sm placeholder:text-gray-400"
                >
            </div>
        </header>

        <!-- Quote of the Day -->
        <section id="qotd-container" class="mb-16 hidden">
            <div class="flex items-center gap-3 mb-6">
                <span class="h-px flex-1 bg-gray-200"></span>
                <h2 class="text-[10px] uppercase tracking-[0.2em] text-gray-400 font-bold">Quote of the Day</h2>
                <span class="h-px flex-1 bg-gray-200"></span>
            </div>
            <div id="qotd-content">
                <!-- Injected by app.js -->
            </div>
        </section>

        <!-- Quotes Feed -->
        <main>
            <div id="quotes-list" class="space-y-10">
                <!-- Quotes or Skeletons injected here -->
            </div>

            <!-- Error State -->
            <div id="error-container" class="hidden mt-12 text-center p-12 bg-red-50 rounded-3xl border border-red-100">
                <p class="text-red-600 font-medium mb-6">Failed to load quotes. Please try again.</p>
                <button id="retry-button" class="px-8 py-3 bg-red-600 text-white rounded-xl hover:bg-red-700 transition-all font-semibold shadow-lg shadow-red-200">
                    Retry
                </button>
            </div>

            <!-- Load More -->
            <div id="load-more-container" class="mt-16 text-center hidden">
                <button id="load-more-button" class="px-10 py-4 bg-white border border-gray-200 rounded-2xl hover:bg-gray-50 transition-all font-bold text-gray-900 shadow-sm">
                    Load More
                </button>
            </div>
        </main>

        <footer class="mt-32 pb-12 text-center">
            <p class="text-gray-400 text-xs font-medium tracking-wide">Data from FreeAPI • Built with editorial intent</p>
        </footer>
    </div>

    <!-- Templates -->
    <template id="quote-template">
        <div class="quote-card p-10 md:p-12 relative group">
            <button class="copy-button absolute top-6 right-6 text-[9px] px-3 py-1.5 rounded-full uppercase tracking-widest font-bold text-gray-400 opacity-0 group-hover:opacity-100 transition-all duration-300 hover:text-gray-900 hover:border-gray-900">
                Copy
            </button>
            <blockquote class="relative">
                <p class="quote-text text-2xl md:text-3xl font-medium leading-relaxed mb-8 text-gray-900"></p>
                <footer class="flex items-center gap-3">
                    <span class="w-8 h-[2px] bg-gray-200"></span>
                    <span class="author-name text-sm text-gray-500 font-semibold tracking-tight"></span>
                </footer>
            </blockquote>
            <div class="tags-container mt-8 flex flex-wrap gap-2">
                <!-- Tags injected here -->
            </div>
        </div>
    </template>

    <template id="skeleton-template">
        <div class="quote-card p-10 md:p-12 space-y-6">
            <div class="skeleton h-8 w-3/4 rounded-lg"></div>
            <div class="skeleton h-8 w-1/2 rounded-lg"></div>
            <div class="flex items-center gap-3 mt-8">
                <div class="skeleton h-1 w-8 rounded-full"></div>
                <div class="skeleton h-4 w-32 rounded-lg"></div>
            </div>
            <div class="flex gap-2 mt-8">
                <div class="skeleton h-6 w-16 rounded-full"></div>
                <div class="skeleton h-6 w-20 rounded-full"></div>
            </div>
        </div>
    </template>

    <script src="app.js"></script>
</body>
</html>
